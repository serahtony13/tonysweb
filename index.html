
<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleverTap Demo</title>

  <!-- CleverTap SDK -->

  <script type="text/javascript">
    var clevertap = {
      event: [],
      profile: [],
      account: [],
      onUserLogin: [],
      notifications: [],
      privacy: []
    };

    clevertap.account.push({ id: "449-W7Z-775Z" });
    clevertap.privacy.push({ optOut: false });
    clevertap.privacy.push({ useIP: true });

    (function () {
      var wzrk = document.createElement("script");
      wzrk.type = "text/javascript";
      wzrk.async = true;
      wzrk.src =
        ("https:" === document.location.protocol
          ? "https://d2r1yp2w7bby2u.cloudfront.net"
          : "http://static.clevertap.com") + "/js/clevertap.min.js";

      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(wzrk, s);
    })();
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .App {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      width: 320px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 8px 4px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .loginBtn { background: #00c6ff; }
    .profileBtn { background: #f7971e; }

    #ctid {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>

</head>

<body>
  <div class="App">
    <h3>CleverTap Demo</h3>

```
<input id="identity" placeholder="Enter Identity (User ID)">
<input id="email" placeholder="Enter Email">
<input id="name" placeholder="Enter Name">

<select id="gender">
  <option value="">Select Gender</option>
  <option value="M">Male</option>
  <option value="F">Female</option>
</select>

<input id="customerType" placeholder="Customer Type (Premium / Free)">

<button class="loginBtn" onclick="App.onLogin()">OnUserLogin</button>
<button class="profileBtn" onclick="App.pushProfile()">Profile Push</button>

<div id="ctid">CleverTap ID: Not available</div>
```

  </div>

  <script>
    class App {

      static getInputValues() {
        return {
          identity: document.getElementById("identity").value,
          email: document.getElementById("email").value,
          name: document.getElementById("name").value,
          gender: document.getElementById("gender").value,
          customerType: document.getElementById("customerType").value
        };
      }

      static onLogin() {
        var data = App.getInputValues();

        if (!data.identity || !data.email) {
          alert("Identity and Email are required!");
          return;
        }

        clevertap.onUserLogin.push({
          Site: {
            Identity: data.identity,
            Email: data.email,
            Name: data.name
          }
        });

        console.log("onUserLogin:", data);

        App.waitForCTID();
      }

      static pushProfile() {
        var data = App.getInputValues();

        if (!data.email) {
          alert("Email is required for profile push!");
          return;
        }

        clevertap.profile.push({
          Site: {
            Email: data.email,
            Name: data.name,
            Gender: data.gender,
            CustomerType: data.customerType
          }
        });

        console.log("Profile push:", data);

        App.waitForCTID();
      }

      static waitForCTID(retries = 10) {
        var interval = setInterval(function () {
          if (clevertap.getCleverTapID) {
            var id = clevertap.getCleverTapID();

            if (id) {
              document.getElementById("ctid").innerText =
                "CleverTap ID: " + id;
              console.log("CleverTap ID:", id);
              clearInterval(interval);
            }
          }

          if (--retries === 0) {
            clearInterval(interval);
          }
        }, 500);
      }
    }
  </script>

</body>
</html>
